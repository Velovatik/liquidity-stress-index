# Демо LSI: Postgres + Go-приложение
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lsi
      POSTGRES_PASSWORD: lsi
      POSTGRES_DB: lsi
    ports:
      - "5432:5432"
    volumes:
      - lsi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lsi -d lsi"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://lsi:lsi@postgres:5432/lsi?sslmode=disable
      APP_ROOT: /app
      LISTEN_ADDR: ":8080"

volumes:
  lsi_pgdata:
